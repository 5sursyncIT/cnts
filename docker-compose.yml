services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-cnts}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cnts}
      POSTGRES_DB: ${POSTGRES_DB:-cnts}
    ports:
      - "127.0.0.1:5432:5432"
    restart: always
    volumes:
      - postgres_data:/var/lib/postgresql/data

  portal:
    build:
      context: .
      dockerfile: ./portal/Dockerfile
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_APP_URL: https://cnts.5sursync.com
      BACKEND_URL: http://api:8000
    ports:
      - "127.0.0.1:3000:3000"
    restart: always

  web:
    build:
      context: .
      dockerfile: ./web/Dockerfile
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_APP_URL: https://cnts.5sursync.com
      BACKEND_API_URL: http://api:8000
    ports:
      - "127.0.0.1:3001:3000"
    restart: always

  api:
    build:

      context: ./backend
    environment:
      CNTS_ENV: ${CNTS_ENV:-dev}
      CNTS_LOG_LEVEL: ${CNTS_LOG_LEVEL:-INFO}
      CNTS_DATABASE_URL: ${CNTS_DATABASE_URL:-postgresql+psycopg://cnts:cnts@db:5432/cnts}
      CNTS_CNI_HASH_KEY: ${CNTS_CNI_HASH_KEY:-change-me}
      CNTS_DIN_SITE_CODE: ${CNTS_DIN_SITE_CODE:-CNTS0}
      CNTS_FRACTIONNEMENT_MAX_OVERAGE_ML: ${CNTS_FRACTIONNEMENT_MAX_OVERAGE_ML:-250}
      CNTS_REDIS_URL: redis://redis:6379/0
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - ./backend/app:/app/app
      - ./backend/alembic:/app/alembic
      - ./backend/alembic.ini:/app/alembic.ini
      - ./backend/tests:/app/tests
      - ./backend/static:/app/static
    depends_on:
      - db
    restart: always

  redis:
    image: redis:7-alpine
    ports:
      - "127.0.0.1:6379:6379"
    restart: always

  celery-worker:
    build:
      context: ./backend
    command: celery -A app.core.celery_app worker --loglevel=info
    environment:
      CNTS_ENV: ${CNTS_ENV:-dev}
      CNTS_LOG_LEVEL: ${CNTS_LOG_LEVEL:-INFO}
      CNTS_DATABASE_URL: ${CNTS_DATABASE_URL:-postgresql+psycopg://cnts:cnts@db:5432/cnts}
      CNTS_CNI_HASH_KEY: ${CNTS_CNI_HASH_KEY:-change-me}
      CNTS_REDIS_URL: redis://redis:6379/0
    depends_on:
      - db
      - redis
    restart: always

  celery-beat:
    build:
      context: ./backend
    command: celery -A app.core.celery_app beat --loglevel=info
    environment:
      CNTS_REDIS_URL: redis://redis:6379/0
    depends_on:
      - redis
    restart: always

volumes:
  postgres_data:
